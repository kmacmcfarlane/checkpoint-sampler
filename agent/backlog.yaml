    testing:
      - "command: make test-e2e && cat .e2e/summary.txt && cat .e2e/sweep.txt"
    notes: |
      The e2e_sweep.sh script has a bash integer comparison bug on line 33 when the shard count
      variable contains a trailing newline. Additionally, summary.txt/sweep.txt are not reliably
      written when Phase 5 report merge triggers set -euo pipefail early exit via npm notice stderr.
      Root cause: SHARDS variable passed to sweep script may have trailing newline or the shard
      detection regex produces a non-integer. Source: QA sweep during B-098.
