schema_version: 2
project: checkpoint-sampler
defaults:
  priority_order: "higher_is_more_important"
  status_field: "status"
  blocked_field: "blocked"
  blocked_reason_field: "blocked_reason"
  review_feedback_field: "review_feedback"
  requires_field: "requires"

stories:
  # ─── Enhancements (2026-02-26) ──────────────────────────────────────────────

  # ─── Code quality alignment stories ──────────────────────────────────────────

  - id: S-093
    title: Confirmation dialog for regenerating a valid sample set
    type: feature
    status: uat
    priority: 25
    complexity: low
    requires: []
    notes: |
      When a user clicks Regenerate on a sample set that passes validation (all expected
      samples exist), show a confirmation dialog asking if they are sure they want to
      regenerate. Prevents accidental overwrite of valid sample data.
      Key files: frontend/src/components/JobLaunchDialog.vue (or regeneration trigger component).
    acceptance:
      - "FE: Clicking Regenerate on a validated sample set shows a confirmation dialog"
      - "FE: Dialog explains that all expected samples already exist and regeneration will overwrite them"
      - "FE: Cancel aborts the operation, Confirm proceeds with regeneration"
      - "FE: No confirmation dialog when the sample set has missing samples (incomplete validation)"
      - "FE: Unit tests for confirmation dialog trigger logic"
    testing:
      - "Test confirmation appears for complete sample sets, does not appear for incomplete ones"
      - "Test cancel and confirm paths"
  - id: S-096
    title: Delete dimension mapping preset
    type: feature
    status: uat
    priority: 25
    complexity: low
    requires:
      - S-094
    notes: |
      Add or improve delete functionality for dimension mapping presets using the
      standard confirmation dialog (S-094).
      Key files: frontend/src/components/PresetSelector.vue.
    acceptance:
      - "FE: Delete button on dimension mapping preset shows the standard confirmation dialog"
      - "FE: Confirming delete removes the preset"
      - "FE: After deletion, the preset selector resets to no selection or the next available preset"
      - "FE: Unit tests for delete confirmation flow"
    testing:
      - "Test deleting a preset that is currently selected"
      - "Test deleting the last remaining preset"
  - id: S-098
    title: ETA per sample and per job (moving average)
    type: feature
    status: uat
    priority: 25
    complexity: medium
    requires: []
    notes: |
      Add estimated time of arrival for individual samples and overall job completion.
      Uses a moving average of recent sample generation times to calculate ETA.
      Key files: backend/internal/service/comfyui_executor.go (timing data),
      backend/internal/service/websocket.go (ETA in progress events),
      frontend/src/components/JobProgressPanel.vue (ETA display).
    acceptance:
      - "BE: Track per-sample generation time and compute moving average"
      - "BE: Include per-sample ETA and per-job ETA in WebSocket progress events"
      - "FE: JobProgressPanel displays ETA for the current sample being generated"
      - "FE: JobProgressPanel displays overall job ETA based on remaining samples and moving average"
      - "FE: ETA updates as each sample completes and the average adjusts"
      - "BE: Unit tests for moving average calculation"
      - "FE: Unit tests for ETA display"
    testing:
      - "Test ETA accuracy improves after several samples (moving average stabilizes)"
      - "Test ETA display with varying sample generation times"
      - "Test edge case: first sample has no prior average to work with"
  - id: S-101
    title: Study editor validation field highlighting
    type: feature
    status: uat
    priority: 15
    complexity: low
    requires: []
    notes: |
      Enhance the study editor to highlight the specific field(s) that have validation
      errors. For duplicate values, highlight all but the first occurrence of the
      duplicated value.
      Key files: frontend/src/components/StudyEditor.vue.
    acceptance:
      - "FE: Fields with validation errors are visually highlighted (red border or similar)"
      - "FE: For duplicate values, all duplicate occurrences except the first are highlighted"
      - "FE: Highlight clears when the validation error is resolved"
      - "FE: Unit tests for field highlighting with various validation error types"
    testing:
      - "Test highlighting for each validation error type (duplicates, invalid chars, empty required fields)"
      - "Test that only the correct fields are highlighted, not all fields"
      - "Test highlight clears on fix"
  - id: B-059
    title: "Training run discovery returns empty — both viewer and Generate Samples selectors show nothing"
    priority: 90
    complexity: medium
    status: closed
    requires: []
    acceptance:
      - "GET /api/training-runs returns training runs discovered from study-scoped sample directories"
      - "GET /api/training-runs?source=checkpoints returns training runs discovered from checkpoint directories"
      - "Sample Set selector in the left drawer populates on initial page load"
      - "Training run selector in Generate Samples dialog populates with checkpoint-based training runs"
      - "Existing E2E tests continue to pass"
    testing:
      - "command: make test-backend"
      - "command: make test-e2e"
    notes: |
      Closed — not a code bug. Root cause was Docker bind mounts created before CIFS mount at /mnt/lucy was available.
      Containers needed recreation (make down && make up-dev) after CIFS was restored.
      No code changes required.
  - id: B-060
    title: "Drawer open/close resets dirty dimension mappings; axis role assignment should swap instead of block"
    priority: 80
    complexity: medium
    status: done
    requires: []
    acceptance:
      - "Opening and closing the left-side drawer does not reset dimension mappings that the user has modified since the last
        preset load/save"
      - "Assigning X/Y/Slider to a dimension that is already assigned to another dimension swaps the roles between the two
        dimensions instead of hiding the option"
      - "Existing E2E tests continue to pass"
    testing:
      - "command: make test-frontend"
      - "command: make test-e2e"
    notes: |
      Two related UX issues in dimension mapping:
      1. Drawer toggle reloads preset mappings, discarding user edits. The drawer should preserve in-memory dirty state.
      2. S-089 unified selector hides axis options already held by another dimension (mutual exclusion). Instead, selecting an already-assigned axis role should swap — the old holder gets the new dimension's previous role.
  - id: B-064
    title: "openFiltersDrawer E2E helper strict mode violation — sidebar drawer body remains in DOM after B-060"
    priority: 65
    complexity: low
    status: closed
    requires: []
    acceptance:
      - "All 7 failing tests in combo-solo-click.spec.ts, dimension-filtering.spec.ts, and filters-slideout-layout.spec.ts
        pass with zero strict mode violations"
      - "openFiltersDrawer helper disambiguates between the sidebar drawer body and the filters drawer body"
    testing:
      - "command: make test-e2e SPEC=\"combo-solo-click.spec.ts dimension-filtering.spec.ts filters-slideout-layout.spec.ts\""
    notes: |-
      Fix was proactively applied during B-063 (commit 5b2cf2e). The openFiltersDrawer helper already uses the scoped locator '.n-drawer--right-placement .n-drawer-body-content-wrapper'. All 15 tests pass. No code changes required.
  - id: B-065
    title: "E2E: openFiltersDrawer helper fails with strict mode violation after B-060 dual-drawer change"
    priority: 65
    complexity: low
    status: closed
    requires: []
