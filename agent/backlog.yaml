    title: "Sanitize training run directory names (replace slashes with underscores)"
    type: bug
    status: uat
    priority: 85
    complexity: low
    requires: []
    notes: |
      Training run names can contain directory prefixes with slashes (e.g. qwen/Qwen2-VL),
      causing ambiguous directory depth in [output_dir]. When constructing filesystem paths
      for training run directories, replace all forward and backward slashes with underscore
      (_) to create a single directory level. Sanitization is filesystem-only — DB/API keeps
      the original name with slashes.
      Key files: backend path-construction logic for sample output directories.
    acceptance:
      - "BE: Replace forward and backward slashes with _ when constructing training run directory paths"
      - "BE: DB and API continue to store/return the original training run name with slashes"
      - "BE: Reading existing sanitized directories maps back to the correct training run"
      - "E2E: Test fixture data includes at least one training run name with slashes (subdir in checkpoint_dir)"
      - "BE: Unit tests for slash sanitization in path construction"
    testing:
      - "Ensure fixture data includes training run names like 'qwen/Qwen2-VL' with directory separators. Verify on-disk directory
        is 'qwen_Qwen2-VL' (single level). Test both forward and backward slashes. Verify round-trip: write samples to sanitized
        dir, read back, confirm correct training run association."
