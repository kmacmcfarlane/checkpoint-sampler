  - id: B-080
    title: "Job executor race condition: sql no rows during concurrent cancel/completion"
    type: bug
    priority: 60
    status: uat
    complexity: low
    requires: []
    acceptance:
      - "Job executor gracefully handles cancellation during item processing without logging errors"
      - "No 'sql: no rows in result set' errors appear in logs when a running job is cancelled"
    testing:
      - "command: make test-e2e"
    notes: |
      When a job is cancelled (e.g., during E2E test afterEach cleanup) while the executor
      is still processing items, the executor attempts to update/query job rows that have
      already been removed or marked as cancelled. The executor does not check for cancellation
      before each DB write. Error log: "failed to update item status to completed" with
      "sql: no rows in result set" (3 occurrences during E2E runs).
