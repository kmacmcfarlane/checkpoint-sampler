  - id: S-119
    title: "Per-model-type workflow restore on training run change"
    priority: 25
    status: uat
    complexity: low
    requires: []
    acceptance:
      - "FE: Per-model-type workflow is speculatively applied when model type is already cached"
      - "FE: Behavior is unchanged when model type is not cached (waits for metadata fetch)"
      - "FE: Unit tests for speculative workflow application from cache"
    notes: |
      Currently restoreModelInputs is called when the training run changes (after metadata
      fetch). If the user opens the dialog and the training run is already known (from restore),
      the per-model-type workflow won't be applied until after the metadata loads. Speculatively
      apply the per-model-type workflow earlier if the model type is already cached from a
      previous session.
      Source: developer.
    testing:
