  - id: B-098
    title: Training run selector truncates long names (needs multi-line wrap)
    type: bug
    status: uat
    priority: 85
    complexity: low
    requires: []
    notes: >
      Training run selector in the main controls slideout cuts off long training run
      names with ellipsis. Names should wrap to multiple lines instead of truncating.
      FE-only CSS fix on the NSelect component.
      Source: user UAT feedback.
    acceptance:
      - "FE: Training run selector wraps long names to multiple lines instead of truncating"
      - "FE: Dropdown options also display full names without truncation"
      - "FE: Layout remains clean with wrapped names"
      - "FE: Unit tests for long name rendering"
    testing:
      - "Test with realistic long training run names. Verify both the selected value display and the dropdown options."
  - id: B-107
    title: "Manage Study: Checkpoint Status disappears after regenerate attempt"
    type: bug
    status: uat
    priority: 70
    complexity: medium
    requires: []
    notes: >
      After attempting to regenerate existing samples with the confirmation dialog
      after updating a study, the Checkpoint Status no longer appears in the
      Generate Samples dialog. State appears to be corrupted by the failed
      regenerate attempt.
      Source: user UAT feedback.
    acceptance:
      - "FE: Checkpoint Status remains visible in Generate Samples after a regenerate attempt"
      - "FE: Failed or cancelled regenerate does not corrupt Generate Samples state"
      - "FE: Unit tests for state preservation after regenerate attempt"
    testing:
      - "Update a study, trigger regenerate, then open Generate Samples — Checkpoint Status should still be visible."
      - "Test both successful and failed regeneration paths."
  - id: S-132
    title: "X/Y axis sliders rework — bottom/right positioning, dimension mappings, lightbox sync"
    type: feature
    status: uat
    priority: 75
    complexity: high
    requires: []
    notes: |
      Rework of S-130 and S-131. The current master slider at the top should be replaced by
      animation controls. A new X slider (horizontal, bottom of viewport) and Y slider (vertical,
      right side of viewport) replace the master slider concept.

      Target layout:
      - Top: animation controls (move from current right-side position to where master slider was)
      - Bottom edge: horizontal X slider
      - Right edge: vertical Y slider

      Both sliders are optional dimension mappings — hidden in both main view and lightbox when
      no dimension is mapped to that axis. When mapped, lightbox X/Y sliders sync to main view
      sliders (same behavior as current master slider sync).

      Replaces: S-130, S-131.
      Source: user grooming session 2026-03-18.
    acceptance:
      - "FE: Remove master slider from top position, replace with animation controls"
      - "FE: Add horizontal X slider pinned to bottom edge of viewport"
      - "FE: Add vertical Y slider pinned to right edge of viewport"
      - "FE: X and Y sliders are selectable as optional dimension mappings"
      - "FE: X slider hidden when no dimension mapped to X axis (main view and lightbox)"
      - "FE: Y slider hidden when no dimension mapped to Y axis (main view and lightbox)"
      - "FE: Lightbox X/Y sliders synced to main view X/Y sliders"
      - "FE: Animation controls positioned at top where master slider was"
      - "FE: Unit tests for slider visibility, dimension mapping, and lightbox sync"
      - "E2E: Verify X/Y slider positioning, visibility toggling, and lightbox sync"
    testing:
      - "Both sliders unmapped — neither visible in main view or lightbox"
      - "Only one slider mapped — other hidden, mapped one functional"
      - "Switching mappings while lightbox is open — sliders update correctly"
      - "Slider sync state after closing/reopening lightbox"
      - "Animation controls render correctly in new top position without regression"
  - id: B-114
    title: "Clear-existing samples should be a job param applied at job start, not queue time"
    type: bug
    status: todo
    priority: 55
    complexity: medium
    requires: []
    notes: >
      The "clear existing samples" behavior should be a job parameter that takes effect
      when the job first starts running, not when it's queued. On resume after failure,
      clearing should NOT happen again. Verify the Generate Samples dialog's clear-existing
      flag follows the same pattern. Source: user UAT feedback on B-107.
    acceptance:
      - "BE: Clear-existing is stored as a job parameter, not executed at queue time"
      - "BE: Clearing happens once when the job transitions to running for the first time"
      - "BE: Resuming a failed job does not re-clear existing samples"
      - "FE: Generate Samples dialog clear-existing flag uses the same job param behavior"
      - "BE: Unit tests for clear-at-start vs clear-at-queue and resume scenarios"
    testing:
      - "Edge case: job fails mid-generation, some new samples exist alongside cleared slots. Resume should continue without
        re-clearing."
      - "Verify Generate Samples dialog queues jobs with the same clear-existing param behavior."
  - id: B-115
    title: "Regenerate confirmation dialog missing on study update"
    type: bug
    status: todo
    priority: 55
    complexity: medium
    requires:
      - B-114
    notes: >
      When updating a study that has existing generated samples for checkpoints, a confirmation
      dialog should appear asking whether to regenerate affected samplesets. "Yes, regenerate"
      queues jobs with clear-existing flag (using B-114's job param behavior). "No" just updates
      the study without touching samples. Source: user UAT feedback on B-107.
    acceptance:
      - "FE: Updating a study with existing samples shows regenerate confirmation dialog"
      - "FE: Dialog lists affected samplesets across checkpoints"
      - "FE: 'Yes, regenerate' queues jobs with clear-existing job param for affected samplesets"
      - "FE: 'No' updates the study without regenerating or clearing samples"
      - "BE: Endpoint supports queuing regenerate jobs for affected samplesets on study update"
      - "FE: Unit tests for dialog appearance, option handling, and job queuing"
    testing:
      - "Test with study that has samples across multiple checkpoints — all affected samplesets should appear in dialog."
      - "Test 'No' path: samples untouched after study update."
      - "Test 'Yes' path: verify jobs queued with clear-existing param per B-114 behavior."
