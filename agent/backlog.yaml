  - id: B-092
    title: "E2E: Missing studies table and study_id column in test DB schema causes 40+ test failures"
    priority: 80
    status: closed
    complexity: medium
    requires: []
    acceptance:
      - "All E2E tests that query studies or sample_jobs.study_id pass without SQL schema errors"
      - "Test database initialization includes all current migrations"
      - "make test-e2e passes with zero schema-related failures"
    testing:
      - "command: make test-e2e"
    notes: |-
      Already fixed by B-091 commit ca4f5a3 which added 'down -v' pre-clean to make test-e2e target, ensuring stale volumes with old DB schema are always wiped before test runs.
  - id: B-093
    title: "E2E: Preset auto-load via localStorage fails — Delete button not visible after auto-load"
    priority: 70
    status: closed
    complexity: low
    requires: []
    acceptance:
      - "Preset auto-load via localStorage works reliably in E2E tests"
      - "Delete button is visible after preset auto-loads from localStorage seed"
    testing:
      - "command: make test-e2e SPEC=preset-dirty-on-autoload.spec.ts"
    notes: |-
      Already fixed by B-091. The preset auto-load E2E tests pass consistently (4 consecutive runs, all 5 tests passing each time). The timing race that caused the flakiness was eliminated when B-091 replaced the window.prompt listener with the NModal save dialog pattern.
  - id: B-094
    title: "E2E: Lightbox Shift+Arrow keyboard navigation times out (6 tests)"
    priority: 60
    status: closed
    complexity: medium
    requires: []
