      Already implemented as part of S-096 (Delete dimension mapping preset UAT rework). PresetSelector.vue already uses ConfirmDeleteDialog with full unit test coverage.
  - id: W-009
    title: "Populate safetensors test fixtures with minimal valid headers"
    priority: 15
    status: closed
    complexity: low
    requires: []
    acceptance:
      - "E2E: 0-byte .safetensors files in test-fixtures/ replaced with minimal valid headers"
      - "E2E: Minimal header is 8-byte length prefix + empty JSON object"
      - "E2E: No more 'reading header length: EOF' errors in checkpoint metadata scans"
    testing:
      - "Run E2E suite and verify no safetensors header parse errors in logs"
    notes: |-
      Duplicate of B-040 which already replaced 0-byte safetensors fixtures with valid 10-byte minimal headers (8-byte LE length prefix + empty JSON object). All 4 fixture files already contain valid headers. No code changes needed.
  - id: B-083
    title: "E2E: sample-count-preview.spec.ts 2 tests timing out after B-078 per-study validation scoping"
    type: bug
    status: closed
    priority: 70
    complexity: medium
    requires: []
    acceptance:
      - "sample-count-preview.spec.ts test 'Generate Samples dialog shows validation preview with sample counts' passes reliably"
      - "sample-count-preview.spec.ts test 'Generate Samples dialog shows per-checkpoint validation status rows' passes reliably"
      - "Tests use pre-seeded fixture study or create matching sample directories for dynamic studies"
    testing:
      - "command: make test-e2e SPEC=sample-count-preview.spec.ts"
    notes: |-
      Duplicate of B-082. The fix (using pre-seeded fixture study instead of dynamically-created studies) was already applied to sample-count-preview.spec.ts as part of B-082. All 7 tests in the spec pass reliably.
  - id: W-021
    title: "Gitignore Playwright HTML report directory"
