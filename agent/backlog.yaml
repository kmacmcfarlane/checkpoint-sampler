  - id: S-116
    title: "Training run and study status beads in Generate Samples"
    type: enhancement
    status: uat
    priority: 50
    complexity: high
    requires: []
    notes: |
      Add up to two status beads to training run and study items in the Generate Samples UI.
      Each item can show a blue/green bead (blue wins) and a red/yellow bead (red wins).

      Training Run Beads:
      - Blue: running job for the sample set
      - Green: all study sample sets are complete
      - Yellow: incomplete sample sets without running jobs
      - Red: failed job with missing samples

      Study Beads:
      - Blue: running job for selected sample set
      - Green: selected sample set is complete
      - Yellow: selected sample set exists but incomplete
      - Red: failed job with missing samples

      May require new BE API fields to expose aggregated job/completion status.
    acceptance:
      - "FE: Training run items display up to two beads based on status rules"
      - "FE: Study items display up to two beads based on status rules"
      - "FE: Blue bead takes priority over green; red takes priority over yellow"
      - "BE: API exposes sufficient data for frontend to compute bead states (investigate if new fields needed)"
      - "E2E: Verify bead states for running, complete, incomplete, and failed scenarios"
    testing:
      - "Test priority rules: blue overrides green, red overrides yellow"
      - "Test bead state transitions as jobs start, complete, and fail"
      - "Investigate whether existing API data suffices or new endpoints are needed"
