  - id: W-013
    title: "E2E test for keyboard auto-repeat slider navigation"
    priority: 25
    status: uat
    complexity: low
    requires: []
    acceptance:
      - "E2E: Playwright test exercises arrow key auto-repeat on slider"
      - "E2E: Test asserts correct slider progression under repeated key presses"
      - "E2E: Test catches stale-prop race conditions that JSDOM cannot reproduce"
    notes: |
      Keyboard-driven slider behaviors (arrow navigation with auto-repeat) are difficult
      to test in JSDOM because the stale-prop race condition only manifests at real browser
      auto-repeat rates. A Playwright E2E test using page.keyboard.down('ArrowRight') with
      repeated presses would give higher confidence.
      Source: developer.
    testing:
      - "Verify slider moves correctly under rapid repeated arrow key presses"
  - id: W-014
    title: "App.test.ts window.innerWidth cleanup between tests"
    priority: 25
    status: uat
    complexity: low
    requires: []
    acceptance:
      - "FE: afterEach hook resets window.innerWidth to a known default in App.test.ts"
      - "FE: Tests after the eager auto-select section are not affected by modified innerWidth"
      - "FE: All existing tests continue to pass"
    notes: |
      The "Eager auto-select" tests in App.test.ts set Object.defineProperty(window, 'innerWidth')
      which persists across tests since vi.unstubAllGlobals() only removes vi.stubGlobal stubs.
      A shared afterEach that resets innerWidth would prevent ordering-dependent test failures.
      Source: developer.
    testing:
      - "Verify tests pass in any order after fix"
