      - "Check that WebSocket progress events are handled before the first inference starts"
    notes: |
      Bug: The per-sample inference progress bar in the Sample Jobs Dialog does not display
      for the first generation, but works correctly for subsequent samples. Likely a timing
      issue where the progress bar reactive state isn't initialized before the first progress
      event arrives from the WebSocket.
      Key files: frontend/src/components/JobProgressPanel.vue.
  - id: B-068
    title: "Lightbox slider not synced with master slider on shift+arrow navigation"
    priority: 60
