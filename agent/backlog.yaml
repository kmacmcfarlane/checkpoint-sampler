  - id: S-102
    title: "Show full sample params for currently generating sample in job list"
    priority: 40
    status: todo
    complexity: medium
    requires: []
    acceptance:
      - "FE: Job progress panel shows the full generation parameters for the currently generating sample"
      - "FE: Parameters displayed include checkpoint name, CFG, steps, sampler, and other study params"
      - "BE: WebSocket progress events include or reference the current sample's generation parameters"
