    notes: |-
      Already implemented in S-095. StudyEditor already uses ConfirmDeleteDialog with 'Also delete sample data' checkbox. All acceptance criteria satisfied with existing code. No window.confirm() usage remains.
  - id: S-107
    title: "Integrate ConfirmDeleteDialog into preset delete flow"
    priority: 30
    status: closed
    complexity: low
    requires:
      - S-094
    acceptance:
      - "FE: PresetSelector uses ConfirmDeleteDialog instead of window.confirm()"
      - "FE: After deletion, preset selector resets appropriately"
      - "FE: Unit tests for ConfirmDeleteDialog integration in PresetSelector"
    testing:
