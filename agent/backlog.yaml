  - id: B-066
    title: "Job executor logs spurious error when database is reset mid-poll"
    priority: 40
    status: uat
    complexity: low
    requires: []
    acceptance:
      - "The job executor does not log at ERROR level when the row it is trying to update has been deleted (e.g., gracefully
        handles sql: no rows in result set as a warning or info)"
      - "The log level is downgraded to WARN or the error is silenced when it occurs during a database reset or row-not-found
        scenario"
    testing:
      - "command: make test-e2e"
      - "Grep backend logs for level=error.*auto-start — should be absent after fix"
    notes: |
      The job executor poll loop picks up a pending job ID and then attempts to update it to running state.
      Between those two operations, the E2E test reset endpoint drops all tables and reruns migrations,
      leaving no row for that job ID. The UpdateSampleJob call returns sql: no rows in result set,
      which is logged at ERROR level even though it is a benign race between test teardown and the executor loop.
