  - id: R-008
    title: "Treat orphaned running items as resumable in processNextItem"
    type: refactor
    status: uat
    priority: 100
    complexity: medium
    requires: []
    notes: >
      Root-cause fix for B-103. When processNextItem runs with no item in-flight
      (activeItemID == ""), any item in running status is orphaned. This happens
      after stop/resume, server restart, or any crash that leaves an item stuck
      in running. The fix: after scanning for pending items, fall back to orphaned
      running items and reset them to pending before reprocessing. This is safe
      because the activeItemID guard ensures no genuinely in-flight item is affected.
      See state transition audit in plans/zippy-knitting-allen.md for full analysis.
    acceptance:
      - "BE: processNextItem treats orphaned running items as resumable when no item is in-flight (activeItemID == empty)"
      - "BE: Stop then Resume flow correctly reprocesses the interrupted item instead of completing with errors"
      - "BE: Server restart with orphaned running items correctly resumes processing"
      - "BE: Unit tests cover stop/resume and server-restart scenarios with orphaned running items"
      - "BE: No regression — normal happy-path flow (all items pending to completed) unchanged"
    testing:
      - "Unit test: create job with one running item and no activeItemID, call processNextItem, verify item is reset to pending
        and reprocessed"
      - "Unit test: simulate stop+resume sequence, verify orphaned running item is picked up on next tick"
      - "Unit test: simulate server restart (resumeRunningJobs + processNextItem), verify orphaned running item is recovered"
      - "Unit test: verify genuinely in-flight items (activeItemID set) are not affected"
  - id: S-132
    title: "X/Y axis sliders rework — bottom/right positioning, dimension mappings, lightbox sync"
    type: feature
    status: todo
    priority: 60
    complexity: high
    requires: []
    notes: |
      Rework of S-130 and S-131. The current master slider at the top should be replaced by
      animation controls. A new X slider (horizontal, bottom of viewport) and Y slider (vertical,
      right side of viewport) replace the master slider concept.

      Target layout:
      - Top: animation controls (move from current right-side position to where master slider was)
      - Bottom edge: horizontal X slider
      - Right edge: vertical Y slider

      Both sliders are optional dimension mappings — hidden in both main view and lightbox when
      no dimension is mapped to that axis. When mapped, lightbox X/Y sliders sync to main view
      sliders (same behavior as current master slider sync).

      Replaces: S-130, S-131.
      Source: user grooming session 2026-03-18.
    acceptance:
      - "FE: Remove master slider from top position, replace with animation controls"
      - "FE: Add horizontal X slider pinned to bottom edge of viewport"
      - "FE: Add vertical Y slider pinned to right edge of viewport"
      - "FE: X and Y sliders are selectable as optional dimension mappings"
      - "FE: X slider hidden when no dimension mapped to X axis (main view and lightbox)"
      - "FE: Y slider hidden when no dimension mapped to Y axis (main view and lightbox)"
      - "FE: Lightbox X/Y sliders synced to main view X/Y sliders"
      - "FE: Animation controls positioned at top where master slider was"
      - "FE: Unit tests for slider visibility, dimension mapping, and lightbox sync"
      - "E2E: Verify X/Y slider positioning, visibility toggling, and lightbox sync"
    testing:
      - "Both sliders unmapped — neither visible in main view or lightbox"
      - "Only one slider mapped — other hidden, mapped one functional"
      - "Switching mappings while lightbox is open — sliders update correctly"
      - "Slider sync state after closing/reopening lightbox"
      - "Animation controls render correctly in new top position without regression"
  - id: B-113
    title: "e2e_sweep.sh integer comparison error and summary.txt not reliably written"
    type: bug
    priority: 50
    status: uat
    complexity: low
    requires: []
    acceptance:
      - "Running make e2e-sweep after a full test run produces a valid sweep.txt file with correct shard count"
