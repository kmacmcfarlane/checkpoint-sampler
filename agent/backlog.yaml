      Key files: frontend/src/components/JobProgressPanel.vue,
      backend/internal/service/websocket.go (if params need to be added to progress events).
  - id: B-071
    title: "Deterministic pending-job pickup order (ORDER BY created_at)"
    priority: 30
    status: uat
    complexity: low
    requires: []
    acceptance:
      - "BE: ListSampleJobs() store query orders pending jobs by created_at ASC for FIFO processing"
      - "BE: Unit tests verify deterministic ordering of pending job retrieval"
    testing:
      - "Create multiple pending jobs and verify they are picked up in creation order"
    notes: |
      The ListSampleJobs() store query should ORDER BY created_at ASC to ensure FIFO processing
      of pending jobs. Currently the SQLite query may return jobs in arbitrary order when multiple
      jobs are pending.
      Source: developer.
  - id: B-072
    title: "Guard Start() API against concurrent running jobs"
    priority: 50
    status: uat
    complexity: low
    requires: []
    acceptance:
      - "BE: SampleJobService.Start() checks for existing running jobs before starting a new one"
      - "BE: Returns an error if a job is already running"
      - "BE: Unit tests for concurrent start guard"
    testing:
      - "Call Start() while a job is running and verify error is returned"
    notes: |
      The SampleJobService.Start() method doesn't verify that no other job is already running.
      While the executor now won't preempt, the DB can end up with two running jobs, which is
      confusing. Start() should check for existing running jobs and return an error if one exists.
      Source: developer.
  - id: B-073
    title: "ComfyUI WS reconnect on disconnect / recover stuck jobs"
    priority: 55
    status: uat
    complexity: high
    requires: []
    acceptance:
      - "BE: WebSocket connection to ComfyUI automatically reconnects on disconnect"
      - "BE: After reconnect, executor polls ComfyUI history API to detect already-completed prompts"
      - "BE: Jobs stuck in running state due to missed completion events are recovered"
      - "BE: Unit tests for reconnect logic and history-based recovery"
    testing:
      - "Simulate WS disconnect mid-job and verify recovery after reconnect"
      - "Verify stuck jobs are detected and completed via history API polling"
    notes: |
      If the WebSocket connection drops mid-job (e.g. ComfyUI restarts), the executor never
      receives the completion event and the job stays stuck in running. A recovery mechanism
      that polls the ComfyUI history API after reconnect to detect already-completed prompts
      would make the system resilient to mid-job connection losses.
      Source: developer.
  - id: B-074
    title: "Atomic stop-and-transition in executor"
    priority: 25
    status: uat
    complexity: medium
    requires: []
    acceptance:
      - "BE: Executor owns the DB status update to stopped after RequestStop (like completeJob does)"
      - "BE: No window where DB and executor state diverge during stop"
      - "BE: Unit tests for atomic stop-and-transition"
    testing:
      - "Stop a running job and verify DB and executor state are consistent at all points"
    notes: |
      Currently RequestStop clears executor state but the DB update to stopped happens in the
      service layer separately. The executor could own the DB status update after stop (like
      completeJob does), reducing the window where the DB and executor state diverge.
      Source: developer.
  - id: B-075
    title: "Clamp TotalMissing in backend validation to prevent negative values"
    priority: 25
    status: uat
    complexity: low
    requires: []
    acceptance:
      - "BE: TotalMissing = max(0, totalExpected - totalVerified) in validation.go"
      - "BE: API never returns negative total_missing values"
      - "BE: Unit tests for clamping behavior"
    testing:
      - "Test with edge case where totalVerified > totalExpected"
    notes: |
      TotalMissing = totalExpected - totalVerified in validation.go is not clamped at 0.
      While per-checkpoint missing is clamped, the aggregate is not. Returning a negative
      total_missing via the API is semantically incorrect.
      Fix: result.TotalMissing = max(0, totalExpected - totalVerified).
      Source: qa.
  - id: B-076
    title: "Database UNIQUE constraint on study names"
    priority: 30
    status: uat
    complexity: low
    requires: []
    acceptance:
      - "DB: Migration adds UNIQUE constraint on studies.name column"
      - "BE: Concurrent creation of studies with the same name is prevented at the DB level"
      - "BE: Unit tests for unique constraint enforcement"
    testing:
      - "Attempt to insert two studies with the same name and verify DB error"
    notes: |
      Add a migration to add a UNIQUE constraint on studies.name to enforce uniqueness at the
      database level, complementing the service-layer check and preventing race conditions in
      concurrent-user scenarios.
      Source: developer.
