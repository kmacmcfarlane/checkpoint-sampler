    notes: |-
      Fix was proactively applied during B-063 (commit 5b2cf2e). The openFiltersDrawer helper already uses the scoped locator '.n-drawer--right-placement .n-drawer-body-content-wrapper'. All 15 tests pass. No code changes required.
