    acceptance:
      - "FE: StudyEditor uses ConfirmDeleteDialog instead of window.confirm()"
      - "FE: Dialog includes 'Also delete sample data' checkbox"
      - "FE: Unit tests for ConfirmDeleteDialog integration in StudyEditor"
    testing:
