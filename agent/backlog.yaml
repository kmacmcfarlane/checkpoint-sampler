  - id: B-078
    title: "Sample output directory restructure + per-training-run manifest + validation count scoping"
    type: bug
    status: uat
    priority: 90
    complexity: high
    requires: []
    notes: |
      Current manifest.json at study level only allows one training run per study. Directory structure
      must change to [outputs_dir]/[training_run_name]/[study_id]/ with manifest.json at that level
      and checkpoint subdirectories beneath. Validation status currently counts samples across all
      training runs and studies instead of scoping to the selected ones. Demo set structure must also
      be updated. Existing samples require regeneration (no migration).
    acceptance:
      - "BE: Restructure sample output dirs to [outputs_dir]/[training_run_name]/[study_id]/[checkpoint]/"
      - "BE: Place manifest.json at the [outputs_dir]/[training_run_name]/[study_id]/ level"
      - "BE: Checkpoint validation status only shows checkpoints from the selected training run"
      - "BE: Checkpoint validation status only shows sample counts from the selected study"
      - "BE: Update demo fixture directory structure to match new layout"
      - "FE: Update any frontend paths that reference sample locations"
      - "E2E: Verify validation counts are correct for multi-training-run, multi-study scenarios"
      - "DOC: Update filesystem.md with new directory structure"
    testing:
      - "Key edge cases: training run with no samples for a study, study with samples across multiple training runs, demo
        checkpoints should not appear for non-demo training runs"
      - "Verify that the 36/1 and 8/1 count bugs from the report are resolved"
  - id: S-114
    title: "Pre-generate JPEG thumbnails for sample images"
    type: enhancement
    status: uat
    priority: 50
    complexity: medium
    requires: []
    notes: |
      Browser disk cache evicts large sample images (3-4MB each) when scrolling through many
      checkpoints, causing cache misses. Pre-generate JPEG thumbnails at sample creation time.
      Thumbnail settings (max_resolution_x, max_resolution_y, jpeg_quality) configurable in
      config.yaml. Thumbnail generation is optional (disabled by default or via config flag).
      Thumbnails stored in a subdirectory within each checkpoint's sample directory. Frontend
      serves thumbnails in grid view, full-res images in lightbox.
    acceptance:
      - "BE: Generate JPEG thumbnails during sample creation when enabled in config"
      - "BE: Thumbnail settings (max_resolution_x, max_resolution_y, jpeg_quality) in config.yaml"
      - "BE: Thumbnails stored in subdir of each checkpoint's sample directory"
      - "BE: Thumbnail generation is optional via config flag"
      - "FE: Grid view serves thumbnails instead of full-res images when available"
      - "FE: Lightbox continues to serve full-resolution images"
      - "DOC: Update config.yaml example with thumbnail settings"
    testing:
      - "Verify thumbnails are generated at correct resolution and quality"
      - "Test with thumbnail generation disabled — no thumbnails created, full-res served everywhere"
      - "Verify cache behavior improvement with 6x3 grid scrolling through checkpoints"
  - id: S-116
    title: "Training run and study status beads in Generate Samples"
    type: enhancement
    status: uat
    priority: 50
    complexity: high
    requires: []
    notes: |
      Add up to two status beads to training run and study items in the Generate Samples UI.
      Each item can show a blue/green bead (blue wins) and a red/yellow bead (red wins).

      Training Run Beads:
      - Blue: running job for the sample set
      - Green: all study sample sets are complete
      - Yellow: incomplete sample sets without running jobs
      - Red: failed job with missing samples

      Study Beads:
      - Blue: running job for selected sample set
      - Green: selected sample set is complete
      - Yellow: selected sample set exists but incomplete
      - Red: failed job with missing samples

      May require new BE API fields to expose aggregated job/completion status.
    acceptance:
      - "FE: Training run items display up to two beads based on status rules"
      - "FE: Study items display up to two beads based on status rules"
      - "FE: Blue bead takes priority over green; red takes priority over yellow"
      - "BE: API exposes sufficient data for frontend to compute bead states (investigate if new fields needed)"
      - "E2E: Verify bead states for running, complete, incomplete, and failed scenarios"
    testing:
      - "Test priority rules: blue overrides green, red overrides yellow"
      - "Test bead state transitions as jobs start, complete, and fail"
      - "Investigate whether existing API data suffices or new endpoints are needed"
