  - id: B-044
    title: "SQLite PRAGMA foreign_keys=ON not enforced across connection pool"
    priority: 70
    status: uat
    complexity: medium
    requires: []
    acceptance:
      - "PRAGMA foreign_keys=ON is enforced on every database connection, not just the first"
      - "E2E test for cascade deletion verifies that sample_jobs are actually removed (not just that the study delete returns
        204)"
    testing:
      - "command: make test-backend"
      - "command: make test-e2e"
    notes: |
      OpenDB() sets PRAGMA foreign_keys=ON via db.Exec(), which only applies to one connection
      in Go's database/sql pool. New connections from the pool do not inherit the pragma, so FK
      constraints (including ON DELETE CASCADE) may not be enforced on those connections. The fix
      is to use a connection hook or DSN parameter to set the pragma per-connection.
      Found during QA sweep for S-062.
  - id: B-045
    title: "on-demand-validation E2E test fails due to empty POST body on updated validate endpoint"
    priority: 60
    status: uat
    complexity: low
    requires: []
    acceptance:
      - "POST /api/training-runs/{id}/validate returns 200 when called without study_id (empty body)"
      - "E2E test sends a valid JSON body (empty object) to the validate endpoint"
    testing:
      - "command: make test-e2e"
    notes: |
      S-084 added an optional study_id body attribute to the validate endpoint payload in the
      Goa DSL design. This caused the generated DecodeValidateRequest function to require a
      JSON request body (returning goa.MissingPayloadError on EOF). The E2E test sends a POST
      without a body, which now triggers a 400 error.
      Fix: update the E2E test to send an empty JSON object, or make the Goa payload optional.
