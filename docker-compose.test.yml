services:
  comfyui-mock:
    build:
      context: ./comfyui-mock
      dockerfile: Dockerfile
    environment:
      - PORT=8188
      # Checkpoint filenames from test-fixtures/samples (used in UNETLoader object_info
      # so CheckpointPathMatcher can match them to ComfyUI model paths)
      - CHECKPOINT_FILENAMES=my-model-step00001000.safetensors,my-model-step00002000.safetensors
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://127.0.0.1:8188/system_stats || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Copies test-fixture sample images into the writable test_samples_data volume
  # and sets permissions so the backend user (UID 1000) can write generated images.
  # The backend and viewer tests need pre-seeded images in sample_dir, while the
  # job executor also needs write access to that dir to save generated images.
  # Using a named volume + init container avoids polluting the host bind-mounted
  # test-fixtures/samples directory with generated test output.
  samples-init:
    image: busybox
    command: sh -c "cp -a /fixtures/. /data/samples/ && chmod -R 777 /data/samples/"
    volumes:
      - ./test-fixtures/samples:/fixtures:ro
      - test_samples_data:/data/samples
    restart: no

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./backend:/app/backend
      - test_backend_data:/app/data
      - ./test-fixtures/config-with-comfyui.yaml:/app/config.yaml:ro
      - ./test-fixtures/checkpoints:/data/checkpoints:ro
      - test_samples_data:/data/samples
      - ./test-fixtures/workflows:/data/workflows:ro
      - test_go_cache:/home/gouser/.cache/go-build
      - test_go_mod_cache:/home/gouser/go/pkg/mod
    environment:
      - PORT=8080
      - CONFIG_PATH=/app/config.yaml
      - LOG_LEVEL=info
      - ENABLE_TEST_ENDPOINTS=true
      - GOPATH=/home/gouser/go
      - GOCACHE=/home/gouser/.cache/go-build
      - GOMODCACHE=/home/gouser/go/pkg/mod
    depends_on:
      comfyui-mock:
        condition: service_healthy
      samples-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - test_frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

  playwright:
    build:
      context: ./frontend
      dockerfile: Dockerfile.playwright
    working_dir: /app
    # Chromium uses /dev/shm for renderer shared memory.  Docker's default is
    # 64 MB, which is too small for a 131-test suite running in one worker.
    # --disable-dev-shm-usage in playwright.config.ts moves writes to /tmp,
    # but raising the limit here provides a safety margin for any path that
    # still writes to /dev/shm (e.g. crash-handler pipes).
    shm_size: '256m'
    volumes:
      - ./frontend:/app
      - playwright_node_modules:/app/node_modules
    environment:
      - PLAYWRIGHT_BASE_URL=http://frontend:3000
    depends_on:
      frontend:
        condition: service_healthy

volumes:
  test_backend_data:
  test_samples_data:
  test_frontend_node_modules:
  test_go_cache:
  test_go_mod_cache:
  playwright_node_modules:
